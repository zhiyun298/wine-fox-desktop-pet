<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wine-fox 酒狐</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent; /* 桌面悬浮:全透明 */
        user-select: none;
      }
      #container {
        width: 100vw;
        height: 100vh;
      }
      /* canvas 始终填满窗口:缩放时立即等比拉伸并保持居中,避免固定像素尺寸导致的左上角闪跳 */
      #container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #dbg {
        position: fixed;
        top: 4px;
        left: 4px;
        z-index: 999;
        font: 11px/1.4 monospace;
        color: #0f0;
        background: rgba(0, 0, 0, 0.6);
        padding: 4px 6px;
        white-space: pre;
        pointer-events: none;
        display: none;
      }

      /* 聊天:气泡在上方,输入条在气泡下面;容器不挡拖动,子元素按需接管指针 */
      #chat {
        position: fixed;
        top: 6px;
        left: 6px;
        right: 6px;
        z-index: 998;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 5px;
        pointer-events: none;
        font: 12px/1.45 -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }
      #chat-log {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 46vh;
        overflow: hidden;
      }
      .msg {
        max-width: var(--bubble-width, 60%);
        align-self: var(--bubble-align, flex-start);
        max-height: 44vh;
        overflow-y: auto;
        overscroll-behavior: contain;
        pointer-events: auto; /* 允许在窗口可交互时滚动气泡 */
        padding: 5px 9px;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      }
      .msg::-webkit-scrollbar {
        width: 6px;
      }
      .msg::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.28);
        border-radius: 3px;
      }
      .msg::-webkit-scrollbar-track {
        background: transparent;
      }
      .msg.user {
        align-self: var(--bubble-align, flex-start);
        background: rgba(52, 120, 246, 0.92);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg.fox {
        align-self: var(--bubble-align, flex-start);
        background: var(--fox-bubble, rgba(28, 28, 32, 0.9));
        color: #f3f3f3;
        border-bottom-left-radius: 4px;
      }
      .msg.fox.agent {
        background: var(--agent-bubble, rgba(60, 42, 12, 0.92));
      }
      .msg.hint {
        align-self: var(--bubble-align, flex-start);
        background: var(--hint-bubble, rgba(85, 85, 85, 0.9));
        color: #ddd;
        border-bottom-left-radius: 4px;
      }
      .msg.err {
        align-self: flex-start;
        background: rgba(120, 30, 30, 0.92);
        color: #ffdede;
      }
      /* Markdown 渲染元素 */
      .msg code {
        font: inherit;
        font-size: 0.92em;
        background: rgba(255, 255, 255, 0.14);
        padding: 1px 5px;
        border-radius: 4px;
      }
      .msg pre {
        margin: 4px 0;
        background: rgba(0, 0, 0, 0.25);
        padding: 6px 8px;
        border-radius: 6px;
        overflow-x: auto;
        white-space: pre-wrap;
      }
      .msg pre code {
        background: none;
        padding: 0;
        font-size: 1em;
      }
      .msg a {
        color: #ffb45a;
      }
      .msg b { font-weight: 600; }
      .msg i { font-style: italic; }
      .msg h1, .msg h2, .msg h3, .msg h4 {
        margin: 4px 0 2px;
        font-weight: 600;
        line-height: 1.3;
        color: inherit;
      }
      .msg h1 { font-size: 1.25em; }
      .msg h2 { font-size: 1.15em; }
      .msg h3 { font-size: 1.07em; }
      .msg h4 { font-size: 1em; }
      #chat-input {
        display: none;
        width: var(--bubble-width, 60%);
        align-self: var(--bubble-align, flex-start);
        pointer-events: auto;
        border: none;
        outline: none;
        border-radius: 10px;
        padding: 7px 10px;
        font: inherit;
        color: #fff;
        background: rgba(20, 20, 24, 0.92);
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.45);
        caret-color: #ffb45a;
      }
      #chat-input::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="container"></div>
    <div id="dbg"></div>
    <div id="chat">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="和酒狐说点什么…  (/ 开头交给 Agent)" />
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
